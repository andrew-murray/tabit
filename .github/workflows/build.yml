name: build
on:
  push:
    branches: [ master ]
  workflow_dispatch:
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: yarn install --frozen-lockfile
      - run: yarn test
      - run: npx playwright install --with-deps chromium
      - run: yarn test:e2e
